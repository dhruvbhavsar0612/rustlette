name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build with maturin
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin
          maturin develop

      - name: Install test dependencies
        run: |
          . .venv/bin/activate
          pip install pytest pytest-asyncio httpx anyio python-multipart itsdangerous

      - name: Run tests
        run: |
          . .venv/bin/activate
          pytest tests/ -v --tb=short || true
